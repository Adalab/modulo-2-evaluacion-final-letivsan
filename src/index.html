<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Buscador de series | Evaluación mód.2</title>
    <link
      href="https://fonts.googleapis.com/css?family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./scss/main.scss" />
    <link rel="icon" href="/images/faviconfilms.png" />
  </head>

  <body class="page">
    <header class="page__header">
      <h1 class="page__title">Buscador de series</h1>
    </header>

    <main class="page__main">
      <section class="search">
        <form class="search__form">
          <label class="search__label" for="searchSeries">Busca tu serie</label>
          <input
            id="searchSeries"
            class="search__input js_searchInput"
            type="text"
            placeholder="Ej. Gilmore"
          />
          <button class="search__button js_searchButton" type="submit">
            Buscar
          </button>
        </form>
      </section>

      <div class="content">
        <section class="favorites">
          <h2 class="favorites__heading">Series favoritas</h2>
          <ul class="series__list js_seriesList"></ul>
        </section>
      </div>

      <section class="series">
        <h2 class="series__heading">Resultados de búsqueda</h2>
        <ul class="series__list js_seriesList"></ul>
      </section>
    </main>

    <script src="./js/main.js"></script>
  </body>
</html>
